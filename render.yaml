services:
  - type: web
    name: teamtrack-backend
    env: java
    buildCommand: ./gradlew build
    startCommand: java -jar build/libs/TeamTrack_backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: CORS_ORIGINS
        value: https://yourusername.github.io
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
